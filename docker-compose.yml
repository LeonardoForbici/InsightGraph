version: '3.8'

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.13
    container_name: insightgraph-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: insightgraph-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-999}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightgraph-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_FAST_MODEL=${OLLAMA_FAST_MODEL:-qwen2.5-coder:1.5b}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-qwen3.5:4b}
      - OLLAMA_COMPLEX_MODEL=${OLLAMA_COMPLEX_MODEL:-qwen3-coder-next:q4_K_M}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - STATE_DB_FILE=/data/insightgraph_state.db
      - RAG_STORE_FILE=/data/rag_store.db
      - RAG_INDEX_FILE=/data/rag_index.json
      - ENABLE_SSE=${ENABLE_SSE:-true}
      - ENABLE_GIT=${ENABLE_GIT:-true}
      - ENABLE_AI_QUERY=${ENABLE_AI_QUERY:-true}
      - ENABLE_TIMELINE=${ENABLE_TIMELINE:-true}
      - ENABLE_INVESTIGATION=${ENABLE_INVESTIGATION:-true}
      - ENABLE_PERFORMANCE_MONITORING=${ENABLE_PERFORMANCE_MONITORING:-true}
      - ENABLE_IMPACT_CACHE=${ENABLE_IMPACT_CACHE:-true}
    volumes:
      - backend_data:/data
      - ./backend:/app
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insightgraph-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_ENABLE_SSE=${REACT_APP_ENABLE_SSE:-true}
      - REACT_APP_ENABLE_TIMELINE=${REACT_APP_ENABLE_TIMELINE:-true}
      - REACT_APP_ENABLE_AI_QUERY=${REACT_APP_ENABLE_AI_QUERY:-true}
      - REACT_APP_ENABLE_INVESTIGATION=${REACT_APP_ENABLE_INVESTIGATION:-true}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_data:
  backend_data:

networks:
  default:
    name: insightgraph-network
